# Reverse proxy for the SWAT stack.
# `/api` and `/health` and the Swagger docs → NestJS backend (:3000).
# everything else → Next.js frontend (:3001).
# Uses host.docker.internal so the proxy can reach apps run with `pnpm dev`
# on the host. (In a fully containerised deploy, swap these for service names.)

upstream swat_backend {
  server host.docker.internal:3000;
}

upstream swat_web {
  server host.docker.internal:3001;
}

server {
  listen 80;
  server_name _;

  client_max_body_size 10m;

  location /api/ {
    proxy_pass http://swat_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /health {
    proxy_pass http://swat_backend;
  }

  location / {
    proxy_pass http://swat_web;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
