name: Quality

# Reusable quality suite (single source of truth) — lint, typecheck, test, build
# across the pnpm + Turbo monorepo. Called by pr-gate.yml (on PRs) and by
# deploy-staging.yml (as the final gate on the release commit). SWAT is one unified
# monorepo, so there's a single suite — no per-component path filtering needed.
#
# The pnpm monorepo lives in the inner `swat/` dir.

on:
  workflow_call:

# Least privilege: this suite only reads the repo.
permissions:
  contents: read

defaults:
  run:
    working-directory: swat

jobs:
  checks:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # Dummy values so Prisma can resolve the datasource env during generate.
      DATABASE_URL: postgresql://swat:swat@localhost:5432/swat?schema=public
      SESSION_SECRET: ci-session-secret-placeholder
      JWT_SECRET: ci-jwt-secret-placeholder
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          version: 9
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: swat/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @swat/backend run prisma:generate
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
