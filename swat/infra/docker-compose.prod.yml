# SWAT production stack (T-165). Fully containerised: Postgres, Redis, MinIO,
# backend, web, and an Nginx reverse proxy fronting a single public origin (:80).
#
#   docker compose -f infra/docker-compose.prod.yml --env-file infra/docker-compose.prod.env up -d --build
#
# All secrets come from the env file / the host environment — never .env.local.
# Build context is the inner `swat/` monorepo root.
services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: '--encoding=UTF8 --locale=C'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/swat-photos &&
      mc mb --ignore-existing local/swat-thumbnails &&
      mc mb --ignore-existing local/swat-reports &&
      echo 'SWAT buckets ready';
      "

  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    restart: unless-stopped
    # Apply pending migrations (deploy — never `migrate dev` on partitioned tables),
    # then boot the API. Seeding the admin user is a deliberate one-off (runbook),
    # not run on every restart.
    command: ['sh', '-c', 'npx prisma migrate deploy && node dist/main.js']
    environment:
      NODE_ENV: production
      PORT: '3000'
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SESSION_SECRET: ${SESSION_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      # Optional CORS allowlist (comma-separated). Unset → reflect request origin
      # (fine behind the same-origin Nginx). Set to lock the API to known hosts.
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-swat-photos}
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_FORCE_PATH_STYLE: 'true'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: '3001'
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '${PUBLIC_HTTP_PORT:-80}:80'
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      web:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
