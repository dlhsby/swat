<!DOCTYPE html>

<head>

<title>SWAT — Hi-Fi (Web) · DLH Surabaya</title>
<script>
  /* apply saved theme before paint to avoid a flash */
  (function () { try { if (localStorage.getItem('swat-theme') === 'dark') document.documentElement.classList.add('dark'); } catch (e) { } })();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />

<!-- ===== SWAT Design System (source of truth: tokens + components) ===== -->
<link rel="stylesheet" href="design-system/swat-tokens.css" />
<link rel="stylesheet" href="design-system/swat-components.css" />
<!-- ===== Hi-fi app shell + layout polish ===== -->
<link rel="stylesheet" href="hifi/hifi.css" />
</head>
<body>
<div id="root"></div>
