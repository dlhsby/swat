name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# The pnpm monorepo lives in the inner `swat/` directory.
defaults:
  run:
    working-directory: swat

jobs:
  build:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    env:
      # Dummy values so Prisma can resolve the datasource env during generate.
      DATABASE_URL: postgresql://swat:swat@localhost:5432/swat?schema=public
      SESSION_SECRET: ci-session-secret-placeholder
      JWT_SECRET: ci-jwt-secret-placeholder

    steps:
      - uses: actions/checkout@v6

      # pnpm version is read from the root package.json "packageManager" field.
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: swat/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @swat/backend run prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
