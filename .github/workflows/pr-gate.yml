name: PR Gate

# The single REQUIRED status check for merging into main/staging. Always runs the
# reusable quality suite (quality.yml) and aggregates the result into the `gate` job.
# Make `gate` the required check in branch protection for both branches.
#
# SWAT is one unified pnpm+Turbo monorepo, so the suite always runs (no path-filtered
# components to skip) — `gate` is simply green when quality passes, red otherwise.

on:
  pull_request:
    branches: [main, staging]

# Least privilege: PRs only read the repo.
permissions:
  contents: read

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  gate:
    name: gate
    needs: [quality]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions: {}
    steps:
      # `needs.quality.result` is a controlled enum (success/failure/…), but pass it via
      # env rather than interpolating into the shell — keeps the injection surface zero.
      - name: Aggregate required quality gate
        env:
          QUALITY_RESULT: ${{ needs.quality.result }}
        run: |
          echo "quality=$QUALITY_RESULT"
          case "$QUALITY_RESULT" in
            success) echo "Quality gate passed." ;;
            *) echo "::error::quality suite did not pass ($QUALITY_RESULT)"; exit 1 ;;
          esac
