/* permission-gated example — hidden for roles lacking the permission */
const LOCKED = new Set(['n-role']);

/* ---- indexes (built once): node lookup, parent chain, screen→leaf ---- */
const NODES = {}, PARENT = {}, SCR2NAV = {};
(function walk(arr, par){
  for(const n of arr){
    NODES[n.id] = n; PARENT[n.id] = par;
    if(n.screen) SCR2NAV[n.screen] = n.id;
    if(n.children) walk(n.children, n.id);
  }
})(NAV, null);
/* dialog / sub screens map to their owning sidebar leaf */
Object.assign(SCR2NAV, {
  vehicleForm:'n-vehicle', reconcile:'n-board',
  profile:'dashboard', shell:'dashboard'
});
function navPath(leafId){
  const p = []; let id = leafId;
  while(id){ if(NODES[id]) p.unshift(NODES[id].label); id = PARENT[id]; }
  return p.length ? p : ['Layar'];
}
function activeLeafFor(id){
  if(id==='generic' && window.__gen) return window.__gen.leafId;
  return SCR2NAV[id] || id;
}

/* expanded groups (mutated in place) + mobile drawer flag + nav history */
const EXPANDED = new Set(['grp-monitoring','grp-master','grp-sched','grp-txn','sub-driver','sub-vehicle','sub-access','sub-haul']);
window.__mdrawer = false;
const MHIST = [];

/* recursive sidebar renderer */
function navNode(node, depth, activeLeaf){
  if(node.children){
    const open = EXPANDED.has(node.id);
    const top = depth===0;
    let h = '<div class="'+(top?'nav-group':'nav-sub')+(open?' open':'')+'">';
    h += '<button class="nav-parent" data-navtog="'+node.id+'" data-label="'+node.label+'" style="--d:'+depth+'">'+
           '<span class="si">'+(node.ic||'▸')+'</span><span class="nl">'+node.label+'</span><span class="chev">▸</span></button>';
    h += '<div class="nav-kids">';
    for(const c of node.children) h += navNode(c, depth+1, activeLeaf);
    h += '</div></div>';
    return h;
  }
  const isActive = node.id===activeLeaf;
  const locked = LOCKED.has(node.id);
  const attr = node.screen ? 'data-nav="'+node.screen+'"' : 'data-stub="'+node.id+'"';
  const lock = locked ? ' title="Disembunyikan bila tanpa izin"' : '';
  return '<a class="side-link'+(isActive?' active':'')+(locked?' side-locked':'')+'" '+attr+
    ' data-label="'+node.label+'" style="--d:'+depth+'"'+lock+'>'+
    '<span class="si">'+(node.ic||'·')+'</span><span class="nl">'+node.label+'</span></a>';
}
function sidebar(activeArg){
  const cur = window.__current || activeArg;
  const activeLeaf = activeLeafFor(cur);
  /* auto-expand the path to the active leaf */
  let p = PARENT[activeLeaf];
  while(p){ EXPANDED.add(p); p = PARENT[p]; }
  let h = '';
  for(const node of NAV) h += navNode(node, 0, activeLeaf);
  return '<aside class="sidebar">'+h+'</aside>';
}
function topbar(){
  return '<header class="topbar">'+
    '<div class="ti js-collapse" title="Lipat / buka menu">☰</div>'+
    '<div class="logo"><span class="mk">SW</span><b>SWAT</b><span>· DLH Surabaya</span></div>'+
    '<div class="spacer"></div>'+
    '<div class="ti" title="Notifikasi">◔</div>'+
    '<div class="usr"><span class="avatar" style="width:34px;height:34px">AD</span><div class="nm"><b>Ali Darmawan</b><span>Administrasi Data</span></div><span class="muted">▾</span></div>'+
  '</header>';
}
function shell(active, content){
  const col = window.__sidebarCollapsed ? ' collapsed' : '';
  return '<div class="app-shell'+col+'">'+topbar()+sidebar(active)+'<main class="content">'+content+'</main></div>';
}
function frame(url, inner, tag){
  tag = tag || 'Wireframe';
  return '<div class="frame"><div class="frame-head"><div class="dots"><i></i><i></i><i></i></div>'+
    '<div class="url">'+url+'</div><span class="frame-tag">'+tag+'</span></div>'+inner+'</div>';
}
function crumbs(arr){
  let h='<nav class="crumbs crumbs2" aria-label="Breadcrumb">';
  arr.forEach((c,i)=>{
    if(i<arr.length-1) h+='<a href="#">'+c+'</a><span class="sep">/</span>';
    else h+='<span aria-current="page">'+c+'</span>';
  });
  return h+'</nav>';
}
function field(label, control, opts){
  opts=opts||{};
  const req = opts.req?' <span class="req">*</span>':'';
  const help = opts.help?'<span class="field-help">'+opts.help+'</span>':'';
  const err = opts.err?'<span class="field-error">⚠ '+opts.err+'</span>':'';
  return '<div class="field"'+(opts.mb0?' style="margin-bottom:0"':'')+'><label class="field-label">'+label+req+'</label>'+control+help+err+'</div>';
}
function states(arr){
  let h='<div class="states">';
  for(const s of arr){
    h+='<div class="state"><div class="cap">'+s.cap+'</div><div class="bd">'+s.body+'</div></div>';
  }
  return h+'</div>';
}

/* annotation helpers */
function A(n, html){ return {n:n, html:html}; }
function annotPanel(s){
  let h='<h2>'+(s.kicker||'Layar')+'</h2><p class="a-title">'+s.title+'</p><p class="a-desc">'+s.desc+'</p>';
  if(s.meta) h+='<div class="multi-note">'+s.meta+'</div>';
  let groups = s.annot;
  if(!Array.isArray(groups[0])) groups = [['Komponen & Interaksi', groups]];
  for(const [secTitle, items] of groups){
    h+='<p class="a-sec">'+secTitle+'</p>';
    for(const it of items){
      h+='<div class="a-item"><span class="n">'+it.n+'</span><div class="tx">'+it.html+'</div></div>';
    }
  }
  return h;
}
