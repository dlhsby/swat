# Production reverse proxy for the fully-containerised SWAT stack.
# One public origin: `/api`, `/health`, `/api/docs` → NestJS backend; everything
# else → the Next.js web app. Same-origin means the httpOnly `swat.sid` session
# cookie is first-party for the browser AND readable by Next middleware/server
# components — this is what lets the M5 client route-guard become a true
# server-side guard (deviation #7). Upstreams use compose service names.

upstream swat_backend {
  server backend:3000;
}

upstream swat_web {
  server web:3001;
}

server {
  listen 80;
  server_name _;

  # Spec cap is 10 MB (specs/10-nonfunctional §1); photo uploads stay well under.
  client_max_body_size 10m;

  # Proxy timeouts generous enough for report generation / bulk endpoints.
  proxy_connect_timeout 30s;
  proxy_read_timeout 120s;

  location /api/ {
    proxy_pass http://swat_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /health {
    proxy_pass http://swat_backend;
    access_log off;
  }

  location = /health/ready {
    proxy_pass http://swat_backend;
    access_log off;
  }

  location / {
    proxy_pass http://swat_web;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Security headers on the HTML responses (specs/10-nonfunctional §1). The
    # backend sets its own via helmet; CSP lives here because it governs the
    # browser-rendered web app. 'unsafe-inline' is required by Next.js hydration.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
  }
}
