services:
  app:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ..:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:5.7
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE:-dkp_swat}"
      MYSQL_USER: "${MYSQL_USER:-AdminDKP}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD:-Dkpmenur31}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD:-root}"
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "${DB_PORT:-3306}:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$$MYSQL_ROOT_PASSWORD -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  adminer:
    image: adminer:latest
    ports:
      - "${ADMINER_PORT:-8083}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
