# SWAT Docs — nginx static file server (inside the docs container, port 80).
# The edge proxy (Caddy on staging, host Nginx on prod) terminates TLS and
# forwards here; this server just serves the pre-built Docusaurus output.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Compress text assets on the fly.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Long-cache fingerprinted assets; Docusaurus hashes filenames so this is safe.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(?:js|css|woff2?|svg|png|jpg|jpeg|gif|ico)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Clean URLs: fall back to the directory's index.html, then the 404 page.
    location / {
        try_files $uri $uri/ $uri.html $uri/index.html /404.html;
    }

    # Docusaurus emits a styled 404 page.
    error_page 404 /404.html;
}
